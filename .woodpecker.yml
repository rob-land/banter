when:
  - event: tag
    ref: refs/tags/v*

steps:
  publish:
    image: registry.fedoraproject.org/fedora:41
    environment:
      DEPLOY_KEY:
        from_secret: pages_deploy_key
    commands:
      # Toolchain
      - dnf install -y --setopt=install_weak_deps=False flatpak flatpak-builder ostree git rsync openssh-clients

      # Runtime + SDK
      - flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
      - flatpak install -y --user flathub org.gnome.Platform//49 org.gnome.Sdk//49

      # Build into local OSTree repo and prune old commits
      - flatpak-builder --user --repo=repo --force-clean _build build-aux/flatpak/land.rob.Banter.json
      - flatpak build-update-repo --prune --prune-depth=10 repo

      # SSH key for pushing to the pages branch
      - mkdir -p ~/.ssh && chmod 700 ~/.ssh
      - printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519 && chmod 600 ~/.ssh/id_ed25519
      - ssh-keyscan codeberg.org >> ~/.ssh/known_hosts

      # Sync repo contents onto the pages branch and push
      - git clone --branch pages --single-branch ssh://git@codeberg.org/robland/banter.git pages
      - rsync -a --delete --exclude=.git repo/ pages/
      - cp data/banter.flatpakrepo pages/
      - cd pages
      - git config user.email "ci@codeberg.org"
      - git config user.name "Banter CI"
      - git add -A
      - git diff --cached --quiet || git commit -m "Publish $CI_COMMIT_TAG"
      - git push origin pages
