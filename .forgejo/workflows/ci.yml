name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    # Codeberg-only: the selfhosted runner at git.rob.land doesn't
    # expose a `codeberg-small` label, and over there the meson
    # test step runs inside the Publish Flatpak workflow as part
    # of flatpak-builder. Skipped here to avoid queuing forever
    # on the wrong runner pool. (`github.server_url` is the
    # github-compat alias; forgejo-runner v12's schema validator
    # rejects `gitea.*` in `if:` expressions.)
    if: startsWith(github.server_url, 'https://codeberg.org')
    runs-on: codeberg-small
    container:
      image: catthehacker/ubuntu:act-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-pytest python3-gi \
            meson ninja-build blueprint-compiler \
            libgtk-4-dev libadwaita-1-dev \
            libgirepository1.0-dev pkg-config \
            gettext appstream desktop-file-utils

      - name: Configure
        run: meson setup _build

      - name: Build
        run: meson compile -C _build

      - name: Test
        run: meson test -C _build --print-errorlogs
